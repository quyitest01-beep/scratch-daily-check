name: Panda Performance Check

on:
  schedule:
    # 每天北京时间早上 9 点运行（UTC 1:00）
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  perf-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer lighthouse

      - name: Run performance check
        env:
          PANDA_EMAIL: ${{ secrets.PANDA_EMAIL }}
          PANDA_PASSWORD: ${{ secrets.PANDA_PASSWORD }}
        run: node panda-auth-perf-api-login.js
