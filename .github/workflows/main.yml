name: Panda Performance Check

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  staging-check:
    name: 预发布环境 (panda-scratch.com)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run staging performance check
        env:
          PANDA_EMAIL: ${{ secrets.PANDA_EMAIL }}
          PANDA_PASSWORD: ${{ secrets.PANDA_PASSWORD }}
          FEISHU_WEBHOOK: ${{ secrets.STAGING_FEISHU_WEBHOOK }}
          TARGET_PERFORMANCE: ${{ vars.TARGET_PERFORMANCE }}
          TARGET_FCP: ${{ vars.TARGET_FCP }}
          TARGET_LCP: ${{ vars.TARGET_LCP }}
          TARGET_TBT: ${{ vars.TARGET_TBT }}
          TARGET_CLS: ${{ vars.TARGET_CLS }}
          TARGET_SI: ${{ vars.TARGET_SI }}
        run: node panda-auth-perf-api-login.js

  production-check:
    name: 正式环境 (fortuna.fast)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run production performance check
        env:
          FORTUNA_EMAIL: ${{ secrets.FORTUNA_EMAIL }}
          FORTUNA_PASSWORD: ${{ secrets.FORTUNA_PASSWORD }}
          FEISHU_WEBHOOK: ${{ secrets.PROD_FEISHU_WEBHOOK }}
          TARGET_PERFORMANCE: ${{ vars.TARGET_PERFORMANCE }}
          TARGET_FCP: ${{ vars.TARGET_FCP }}
          TARGET_LCP: ${{ vars.TARGET_LCP }}
          TARGET_TBT: ${{ vars.TARGET_TBT }}
          TARGET_CLS: ${{ vars.TARGET_CLS }}
          TARGET_SI: ${{ vars.TARGET_SI }}
        run: node fortuna-perf-check.js
